name: Build RSDKv5 + U (Android)

on:
  push:
    paths:
      - android/**
      - dependencies/**
      - RSDKv5/**
      - RSDKv5U/**
      - platforms/**
      - .github/workflows/build.yml
      - CMakeLists.txt
    branches:
      - master
  workflow_dispatch: # Permite que você também execute o build manualmente pela aba Actions

jobs:
  v5-android:
    name: Build (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RSDKv5
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Sonic Mania
        uses: actions/checkout@v4
        with:
          repository: "RSDKModding/Sonic-Mania-Decompilation"
          path: "Sonic-Mania-Decompilation"

      - name: Checkout Example-Mods
        uses: actions/checkout@v4
        with:
          repository: "RSDKModding/RSDKv5-Example-Mods"
          path: "RSDKv5-Example-Mods"

      - name: Checkout GameAPI
        uses: actions/checkout@v4
        with:
          repository: "RSDKModding/RSDKv5-GameAPI"
          path: "RSDKv5-GameAPI"

      - name: Setup RSDKv5 dependencies
        working-directory: ./dependencies/android
        run: |
          curl -L -O https://downloads.xiph.org/releases/ogg/libogg-1.3.5.zip
          curl -L -O https://downloads.xiph.org/releases/theora/libtheora-1.1.1.zip
          unzip \*.zip
          rm *.zip
          rsync -ar libogg-*/* libogg
          mv libtheora-* libtheora

      - name: Setup RSDKv5 & mods symlinks
        run: |
          rm Game || true
          rmdir $PWD/Sonic-Mania-Decompilation/dependencies/RSDKv5 || true
          ln -s $PWD $PWD/Sonic-Mania-Decompilation/dependencies/RSDKv5
          ln -s $PWD/RSDKv5-GameAPI RSDKv5-Example-Mods/ManiaTouchControls/GameAPI
          ln -s $PWD/RSDKv5-GameAPI RSDKv5-Example-Mods/UltrawideMania/GameAPI
          ln -s $PWD/Sonic-Mania-Decompilation ./android/app/jni/Game
          ln -s $PWD/RSDKv5-Example-Mods/ManiaTouchControls ./android/app/jni/MTC
          ln -s $PWD/RSDKv5-Example-Mods/UltrawideMania ./android/app/jni/UWM

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # --- ADICIONE ESTE PASSO AQUI ---
      - name: Patch Windows-specific code for Android
        run: |
          # 1. Cria uma camada de compatibilidade para simular/ignorar tipos do Windows no Android
          cat << 'EOF' > win32_stub.h
          #ifndef _WIN32
          #include <stdint.h>
          #include <wchar.h>
          #define __int8 char
          typedef unsigned long DWORD;
          typedef wchar_t WCHAR;
          #define GetConsoleWindow() (nullptr)
          #define GetFileAttributesA(x) (-1)
          #define INVALID_FILE_ATTRIBUTES (-1)
          #define FILE_ATTRIBUTE_DIRECTORY (0)
          #define CP_UTF8 (65001)
          #define __fastcall
          #define MultiByteToWideChar(...) (0)
          #define WideCharToMultiByte(...) (0)
          #endif
          EOF

          # 2. Injeta essa camada no início de todos os arquivos que estão quebrando
          cat win32_stub.h RSDKv5/HiteModLoader.h > tmp && mv tmp RSDKv5/HiteModLoader.h
          cat win32_stub.h RSDKv5/Helpers.h > tmp && mv tmp RSDKv5/Helpers.h
          cat win32_stub.h RSDKv5/RSDK/Core/RetroEngine.cpp > tmp && mv tmp RSDKv5/RSDK/Core/RetroEngine.cpp

          # 3. Protege as inclusões de bibliotecas exclusivas do Windows para não serem lidas no Android
          sed -i 's/#include <windows.h>/#ifdef _WIN32\n#include <windows.h>\n#endif/g' RSDKv5/Helpers.h
          sed -i 's/#include <Shlwapi.h>/#ifdef _WIN32\n#include <Shlwapi.h>\n#endif/g' RSDKv5/HiteModLoader.h

          # 4. Garante a compatibilidade de caminhos longos (MAX_PATH) nos sistemas de arquivos de salvamento
          sed -i '1s/^/#ifndef MAX_PATH\n#define MAX_PATH 260\n#endif\n/' RSDKv5/RSDK/User/Steam/SteamStorage.hpp
          sed -i '1s/^/#ifndef MAX_PATH\n#define MAX_PATH 260\n#endif\n/' RSDKv5/RSDK/User/EOS/EOSStorage.hpp

      # --------------------------------

      - name: Build Mania+RSDKv5 Android
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assemble --no-daemon -PABIFILTERS="armeabi-v7a;arm64-v8a" -PRETRO_DISABLE_PLUS -PRETRO_REVISION=3
          mv app/build/outputs/apk/release/*.apk rsdkv5u_mania.apk
          ./gradlew clean
          ./gradlew assemble --no-daemon -PABIFILTERS="armeabi-v7a;arm64-v8a" -PRETRO_DISABLE_PLUS -PRETRO_REVISION=2
          mv app/build/outputs/apk/release/*.apk rsdkv5_mania.apk

      - name: Bundle APK & mods
        run: |
          mkdir -p artifacts/mods
          cp -r android/*.apk artifacts
          mkdir -p artifacts/mods/MTC
          cp -r android/app/jni/MTC/build/* artifacts/mods/MTC || true
          mkdir -p artifacts/mods/UWM
          cp -r android/app/jni/UWM/build/* artifacts/mods/UWM || true
          mkdir -p artifacts/mods/GLShaders/Data/Shaders
          cp -r RSDKv5/Shaders/OGL artifacts/mods/GLShaders/Data/Shaders
          printf "Name=GLShaders\nDescription=OGLShaders\nAuthor=Ducky\nVersion=1.0.0\nTargetVersion=-1\n" > artifacts/mods/GLShaders/mod.ini
          printf "[Mods]\nMTC=y\nUWM=y\nGLShaders=y\n" > artifacts/mods/modconfig.ini

      # HACK: Remove RSDKv5 symlink in Mania to prevent warning in post checkout cleanup
      - name: Cleanup
        run: rm $PWD/Sonic-Mania-Decompilation/dependencies/RSDKv5 || true

      - name: Upload artifact Android
        uses: actions/upload-artifact@v4
        with:
          name: v5-android
          path: artifacts
