name: Build RSDKv5

on: workflow_dispatch

# TODO: readd with: submodules: recursive once we can

jobs:
  v5-android:
    name: Build (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 1. Configurar o Java (Necessário para as ferramentas do Android SDK/NDK)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. Configurar o Android NDK (Responsável por compilar o C/C++ para Android)
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c # Versão estável comum para projetos RSDK

      # 3. Compilar o RSDKv5 via Gradle (Padrão para Android)
      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          # Compila o APK (geralmente lida automaticamente com CMake e NDK por baixo dos panos)
          ./gradlew assembleDebug

      # 4. Organizar os artefatos
      - name: Move artifacts
        run: |
          mkdir artifacts
          # O caminho do APK pode variar, mas geralmente fica aqui:
          mv ./android/app/build/outputs/apk/debug/*.apk ./artifacts/ || true

      # 5. Disponibilizar o arquivo final para download
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v5-android
          path: artifacts
          
