name: Build RSDKv5

on: workflow_dispatch

# TODO: readd with: submodules: recursive once we can

jobs:
  v5-android:
    name: Build (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 1. Configurar o Java (Necessário para as ferramentas do Android SDK/NDK)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. Configurar o Android NDK (Responsável por compilar o C/C++ para Android)
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c # Versão estável comum para projetos RSDK

      # 3. Compilar o RSDKv5 + U para Android
      - name: Build RSDKv5 + U
        # Adicionado o parâmetro PLATFORM=Android (ou equivalente suportado pelo seu Makefile)
        run: |
          make -j8 RSDK_ONLY=1 AUTOBUILD=1 PLATFORM=Android
          make -j8 clean-rsdk
          make -j8 RSDK_ONLY=1 RSDK_REVISION=3 AUTOBUILD=1 PLATFORM=Android
        env:
          # Variáveis de ambiente para o Makefile localizar o NDK
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}

      # 4. Mover e organizar os binários gerados
      - name: Move artifacts
        run: |
          mkdir artifacts
          # Move as bibliotecas .so ou .apk geradas. 
          # O caminho pode variar dependendo do Makefile do seu repositório (ex: bin/Android)
          mv ./bin/Android/* ./artifacts/ || true

      # 5. Disponibilizar o arquivo final para download
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v5-android
          path: artifacts
          
